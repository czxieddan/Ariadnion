[package]
name = "ariadnion-storage-rnmdb"
version = "0.1.0"
edition = "2024"
rust-version = "1.95.0"
license = "AGPL-3.0-or-later"
publish = false

[workspace]

[dependencies]
ariadnion-core = { path = "../../ariadnion-core" }
ariadnion-storage-backup = { path = "../ariadnion-storage-backup" }
